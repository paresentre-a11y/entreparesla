[build]
  publish   = "public"
  functions = "netlify/functions"
  command   = "echo 'Build OK'"

# ── API routes → Netlify Functions ─────────────────────────
[[redirects]]
  from   = "/api/guardar"
  to     = "/.netlify/functions/guardar"
  status = 200

[[redirects]]
  from   = "/api/listar"
  to     = "/.netlify/functions/listar"
  status = 200

[[redirects]]
  from   = "/api/login"
  to     = "/.netlify/functions/login"
  status = 200

# ── SPA fallback ────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security Headers (OWASP recommendations) ────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://TU-SITIO.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control                = "no-store, no-cache, must-revalidate"
